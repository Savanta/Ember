[daemon]
socket_path = ""           # empty = $XDG_RUNTIME_DIR/ember.sock
history_db  = ""           # empty = $XDG_DATA_HOME/ember/history.db
max_history = 500

[dnd]
enabled = false

[sound]
enabled       = true
default_sound = "message-new-instant"  # freedesktop sound-theme event ID
# To use a custom file instead:
# default_sound = ""  (ignored when sound-file hint is set per-notification)

[toast]
position     = "top-right"  # top-right | top-left | bottom-right | bottom-left
animation    = "slide-right" # slide-right | slide-left | slide-down | slide-up | fade | fade-slide
width        = 440
max_visible  = 5
gap          = 10
margin_x     = 18
margin_y     = 50
timeout_normal   = 15000    # ms, 0 = never expire
timeout_critical = 0
timeout_low      = 3000

[toast.theme]
bg_normal      = "#282828"
bg_low         = "#1d2021"
bg_critical    = "#9d0006"
fg             = "#ebdbb2"
fg_dim         = "#bdae93"
font           = "Noto Sans 11"
border_radius  = 8
padding        = 16
border_width   = 1
border_normal  = "#665c54"
border_critical = "#fb4934"
accent_normal  = "#458588"
accent_low     = "#458588"
accent_critical = "#fb4934"
icon_size      = 32

[shortcuts]
focus_next      = "ctrl+grave"
focus_prev      = "ctrl+shift+grave"
dismiss_focused = "ctrl+Delete"
invoke_default  = "ctrl+Return"
action_1        = "ctrl+1"
action_2        = "ctrl+2"
action_3        = "ctrl+3"
open_center     = "super+n"
toggle_dnd      = "super+shift+n"
clear_all       = "ctrl+shift+Delete"

# ── Per-app rules ───────────────────────────────────────────────────────────────
# Each [[app]] block overrides behavior for matching notifications.
# `name`       — case-insensitive substring match against app_name
# `mute`       — suppress toast (notification still stored in history)
# `timeout_ms` — override timeout: 0 = never expire
# `urgency`    — override urgency: "low" | "normal" | "critical"
#
# [[app]]
# name       = "spotify"
# mute       = true
#
# [[app]]
# name       = "firefox"
# timeout_ms = 8000
# urgency    = "low"


