name: Stability Check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Rust tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev libpango1.0-dev libglib2.0-dev \
            libdbus-1-dev libcanberra-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --locked --all-targets

  smoke-e2e:
    name: Smoke IPC (live daemon)
    runs-on: ubuntu-latest
    env:
      XDG_RUNTIME_DIR: /tmp/ember-runtime

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev libpango1.0-dev libglib2.0-dev \
            libdbus-1-dev libcanberra-dev pkg-config dbus xvfb

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Build daemon
        run: cargo build --locked

      - name: Run live IPC smoke test
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$XDG_RUNTIME_DIR"
          rm -f "$XDG_RUNTIME_DIR/ember.sock"

          dbus-run-session -- xvfb-run --auto-servernum bash -c '
            set -euo pipefail
            export XDG_RUNTIME_DIR="'"$XDG_RUNTIME_DIR"'"
            target/debug/ember > /tmp/ember.log 2>&1 &
            EMBER_PID=$!

            cleanup() {
              kill "$EMBER_PID" 2>/dev/null || true
              wait "$EMBER_PID" 2>/dev/null || true
            }
            trap cleanup EXIT

            for _ in $(seq 1 100); do
              [[ -S "$XDG_RUNTIME_DIR/ember.sock" ]] && break
              sleep 0.1
            done

            if [[ ! -S "$XDG_RUNTIME_DIR/ember.sock" ]]; then
              echo "[FAIL] ember socket did not appear"
              cat /tmp/ember.log || true
              exit 1
            fi

            ./scripts/smoke-ipc.sh
          '

      - name: Print daemon log on failure
        if: failure()
        run: cat /tmp/ember.log || true

  smoke-script-lint:
    name: Smoke script sanity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate smoke script syntax
        run: bash -n scripts/smoke-ipc.sh

      - name: Validate smoke script is executable
        run: test -x scripts/smoke-ipc.sh
